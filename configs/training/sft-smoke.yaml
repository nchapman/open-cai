output_dir: outputs/sft/smoke

model:
  name: tvall43/Qwen3.5-4B-heretic
  init_kwargs:
    dtype: bfloat16
    attn_implementation: sdpa

data:
  train_path: data/training/smoke/sft/train.jsonl
  eval_path: data/training/smoke/sft/test.jsonl

training:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  max_steps: 1
  logging_steps: 1
  save_strategy: "no"
  eval_strategy: "no"
  bf16: false
  fp16: false
  gradient_checkpointing: false
  report_to: none

sft:
  chat_template_path: configs/training/chat_templates/qwen3-heretic-sft.jinja
  eos_token: <|im_end|>
  max_length: 1024
  packing: false
  assistant_only_loss: true

peft:
  enabled: true
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
