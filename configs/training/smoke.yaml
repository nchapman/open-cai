seed: 42
test_ratio: 0.25
output_dir: data/training/smoke

sft:
  datasets:
    - source: hf
      id: HuggingFaceTB/smoltalk
      config: smol-magpie-ultra
      split: train
      view: messages
      samples: 4

    - source: local
      path: data/generated/qwen-local-deepseek-v3-2-balanced-full.jsonl
      view: messages
      samples: 4

dpo:
  datasets:
    - source: hf
      id: argilla/ultrafeedback-binarized-preferences-cleaned
      split: train
      view: preference
      samples: 4

    - source: local
      path: data/generated/qwen-local-deepseek-v3-2-balanced-full.jsonl
      view: preference
      samples: 4
