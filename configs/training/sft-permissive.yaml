output_dir: outputs/sft/permissive

model:
  name: tvall43/Qwen3.5-4B-heretic
  init_kwargs:
    dtype: bfloat16
    attn_implementation: sdpa

data:
  train_path: data/training/permissive/sft/train.jsonl
  eval_path: data/training/permissive/sft/test.jsonl

training:
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  num_train_epochs: 1
  logging_steps: 25
  save_strategy: steps
  save_steps: 500
  eval_strategy: "no"
  bf16: true
  fp16: false
  tf32: true
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  dataset_num_proc: 4
  dataloader_num_workers: 2
  report_to: none
  loss_type: chunked_nll

sft:
  chat_template_path: configs/training/chat_templates/qwen3-heretic-sft.jinja
  eos_token: <|im_end|>
  max_length: 8192
  packing: false
  assistant_only_loss: true

peft:
  enabled: true
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
