seed: 42
test_ratio: 0.02
output_dir: data/training/protective

sft:
  datasets:
    - source: hf
      id: HuggingFaceTB/smoltalk
      config: smol-magpie-ultra
      split: train
      view: messages
      samples: 60000

    - source: local
      path: data/generated/protective-observation-v1-full.jsonl
      view: messages
      samples: 10000

dpo:
  datasets:
    - source: hf
      id: argilla/ultrafeedback-binarized-preferences-cleaned
      split: train
      view: preference
      samples: 10000

    - source: local
      path: data/generated/protective-observation-v1-full.jsonl
      view: preference
      samples: 42520
