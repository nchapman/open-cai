output_dir: outputs/dpo/balanced

model:
  name: tvall43/Qwen3.5-4B-heretic
  adapter_path: outputs/sft/balanced
  chat_template_path: configs/training/chat_templates/qwen3-heretic-dpo.jinja
  init_kwargs:
    dtype: bfloat16
    attn_implementation: sdpa

data:
  train_path: data/training/balanced/dpo/train.jsonl
  eval_path: data/training/balanced/dpo/test.jsonl
  drop_overlength: true

training:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.00005
  num_train_epochs: 1
  logging_steps: 25
  save_strategy: steps
  save_steps: 500
  eval_strategy: "no"
  bf16: true
  fp16: false
  tf32: true
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  ddp_find_unused_parameters: false
  dataset_num_proc: 4
  dataloader_num_workers: 2
  report_to: none

dpo:
  beta: 0.1
  max_length: 2048
